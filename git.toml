# ~/.gemini/commands/git.toml

description = "Analyzes git changes and executes atomic commits (Supports language flags: en, kr)."

prompt = """
## Objective
You are an expert DevOps Engineer. Your specific objective is to directly execute atomic git commits via Shell tools by strictly following these steps:

1. Language Detection: Analyze the input `{{args}}`. If it explicitly contains the word 'en', write all commit messages in English. If it contains 'kr', is empty, or has no specific language flag, default to Korean.
2. Context Gathering: Use your Shell tool to run `git status` and `git diff` to analyze current uncommitted changes.
3. Commit Formatting: Group files logically and formulate commit messages strictly using this format: `type(scope): message`.
   - Allowed Types: `add`, `feat`, `fix`, `refactor`, `test`, `docs`, `chore`, `design`.
   - Scope: MUST classify the domain as either `fe` (Frontend) or `be` (Backend).
   - Example 1: `feat(fe): 인박스 보관 버튼 추가`
   - Example 2: `refactor(be): 데이터베이스 커넥션 풀 최적화`
4. Execution: Use your Shell tool to sequentially execute `git add [files]` and `git commit -m "[message]"` for each logical group. DO NOT create any script files.
5. Push: After successful commits, execute `git push origin HEAD` via Shell.
6. Output: Once all Shell commands succeed, print ONLY: "✅ All changes have been logically grouped, committed, and pushed successfully."

INPUT ARGUMENTS:
{{args}}
"""
